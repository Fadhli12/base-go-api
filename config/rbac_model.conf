# Casbin RBAC Model Configuration
# Go API Base — Hybrid RBAC with Resource-Action Permissions
#
# This model supports:
# - RBAC (Role-Based Access Control) with role hierarchy
# - Explicit deny overriding allow (user-level overrides)
# - Wildcard matching for resources (keyMatch2)
# - Effect field (eft) for allow/deny decisions

[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act, eft

[role_definition]
g = _, _

[policy_effect]
e = !some(where (p.eft == deny)) && some(where (p.eft == allow))

[matchers]
m = g(r.sub, p.sub) && keyMatch2(r.obj, p.obj) && (r.act == p.act || p.act == "*")

# -----------------------------------------------------------------------------
# Model Explanation
# -----------------------------------------------------------------------------
#
# [request_definition]
#   r = sub, obj, act
#   - sub: Subject (user_id or role)
#   - obj: Object (resource, e.g., "invoice", "invoice/:id", "user")
#   - act: Action (e.g., "create", "read", "update", "delete", "*")
#
# [policy_definition]
#   p = sub, obj, act, eft
#   - sub: Subject (role name, e.g., "admin", "viewer")
#   - obj: Object (resource pattern, e.g., "invoice", "invoice/*", "*")
#   - act: Action (e.g., "create", "read", "update", "delete", "*")
#   - eft: Effect ("allow" or "deny")
#
# [role_definition]
#   g = _, _
#   - Defines role hierarchy: g(user, role) means user has role
#   - Supports role inheritance: g(user, admin) && g(admin, super_admin)
#
# [policy_effect]
#   e = !some(where (p.eft == deny)) && some(where (p.eft == allow))
#   - Explicit deny overrides allow (safest default)
#   - At least one allow policy must match
#   - Any deny policy blocks the request
#
# [matchers]
#   m = g(r.sub, p.sub) && keyMatch2(r.obj, p.obj) && (r.act == p.act || p.act == "*")
#   - g(r.sub, p.sub): User has role or is direct subject
#   - keyMatch2(r.obj, p.obj): Wildcard resource matching (e.g., "invoice/:id" matches "invoice/*")
#   - (r.act == p.act || p.act == "*"): Exact action match or wildcard action
#
# -----------------------------------------------------------------------------
# Example Policies (stored in database via GORM adapter)
# -----------------------------------------------------------------------------
#
# p = admin, invoice, *, allow          # Admin can do anything on invoices
# p = manager, invoice, create, allow   # Manager can create invoices
# p = manager, invoice, read, allow     # Manager can read invoices
# p = viewer, invoice, read, allow      # Viewer can only read invoices
# p = viewer, invoice, delete, deny     # Explicit deny: viewer cannot delete
#
# g = alice, admin                      # Alice has admin role
# g = bob, manager                      # Bob has manager role
# g = charlie, viewer                   # Charlie has viewer role
#
# -----------------------------------------------------------------------------
# Usage in Go Code
# -----------------------------------------------------------------------------
#
# import "github.com/casbin/casbin/v2"
# import "github.com/casbin/gorm-adapter/v3"
#
# adapter, _ := gormadapter.NewAdapterByDB(db) // db is *gorm.DB
# enforcer, _ := casbin.NewEnforcer("config/rbac_model.conf", adapter)
#
# // Load policies from database
// enforcer.LoadPolicy()
#
# // Check permission
# ok, _ := enforcer.Enforce("alice", "invoice", "create")
# // ok == true (alice has admin role, admin has invoice:*:allow)
#
# // Check explicit deny
# ok, _ := enforcer.Enforce("charlie", "invoice", "delete")
# // ok == false (viewer has invoice:delete:deny)
#
# // Add policy dynamically
# enforcer.AddPolicy("manager", "invoice", "update", "allow")
# enforcer.SavePolicy() // Persist to database
#
# // Add role to user
# enforcer.AddGroupingPolicy("dave", "manager")
# enforcer.SavePolicy()
#
# -----------------------------------------------------------------------------
# Performance Notes
# -----------------------------------------------------------------------------
#
# - LoadPolicy() loads all policies from DB into memory (O(n) startup cost)
# - Enforce() is O(1) for RBAC with cached policies
# - Use Redis cache for frequent permission checks:
#   - Cache key: perm:{user_id}:{resource}:{action}
#   - TTL: 30-60 seconds
#   - Invalidate on permission change via pub/sub
#
# - For large-scale systems (>100k policies):
#   - Consider policy distribution (sharding by tenant)
#   - Use Casbin's Watcher interface for distributed invalidation
#   - Monitor policy load time in metrics
#
# -----------------------------------------------------------------------------
# Wildcard Pattern Matching (keyMatch2)
# -----------------------------------------------------------------------------
#
# keyMatch2 supports:
# - * matches any path segment: invoice/* matches invoice/123
# - : matches single segment: invoice/:id matches invoice/123
# - ** matches multiple segments: /api/** matches /api/v1/invoices
#
# Examples:
# - p = admin, *, *, allow        # Admin can do anything (global wildcard)
# - p = viewer, invoice, read, allow    # Exact match
# - p = editor, invoice/*, *, allow     # Editor can do anything on any invoice
#