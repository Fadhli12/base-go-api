run:
  timeout: 5m
  issues-exit-code: 1

issues:
  exclude-use-default: false
  max-issues-per-linter: 0

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - gocritic

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true
  gocritic:
    enabled-tags:
      - performance
      - style
      - experimental
