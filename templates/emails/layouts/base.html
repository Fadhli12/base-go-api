<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{.Subject}}</title>
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
    <style type="text/css">
        /* Reset styles */
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
        body { height: 100% !important; margin: 0 !important; padding: 0 !important; width: 100% !important; background-color: #f4f4f5; }

        /* Container styles */
        .email-container { max-width: 600px; margin: 0 auto; }
        .email-body { background-color: #ffffff; border-radius: 8px; }

        /* Typography */
        h1 { color: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; font-size: 24px; font-weight: 700; line-height: 32px; margin: 0 0 16px 0; }
        h2 { color: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; font-size: 20px; font-weight: 600; line-height: 28px; margin: 0 0 12px 0; }
        p { color: #4a4a4a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; font-size: 16px; font-weight: 400; line-height: 24px; margin: 0 0 16px 0; }

        /* Button */
        .button { display: inline-block; padding: 12px 24px; background-color: #0066cc; color: #ffffff; text-decoration: none; border-radius: 6px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; font-size: 16px; font-weight: 600; }
        .button:hover { background-color: #0052a3; }

        /* Link */
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Footer */
        .footer { color: #888888; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; font-size: 14px; line-height: 20px; }
        .footer a { color: #666666; }

        /* Responsive */
        @media screen and (max-width: 600px) {
            .email-container { width: 100% !important; }
            .content { padding: 20px !important; }
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f5;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color: #f4f4f5;">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table role="presentation" class="email-container" cellspacing="0" cellpadding="0" border="0" style="max-width: 600px;">
                    <!-- Header -->
                    <tr>
                        <td align="center" style="padding: 0 0 24px 0;">
                            <h1 style="margin: 0; font-size: 28px; color: #0066cc;">{{.AppName}}</h1>
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td class="email-body" style="background-color: #ffffff; border-radius: 8px; padding: 40px;">
                            {{template "content" .}}
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td class="footer" align="center" style="padding: 24px 0 0 0; color: #888888;">
                            <p style="margin: 0 0 8px 0; font-size: 14px; line-height: 20px;">
                                &copy; {{.Year}} {{.AppName}}. All rights reserved.
                            </p>
                            {{if .SupportEmail}}
                            <p style="margin: 0; font-size: 14px; line-height: 20px;">
                                <a href="mailto:{{.SupportEmail}}" style="color: #666666;">Contact Support</a>
                            </p>
                            {{end}}
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
