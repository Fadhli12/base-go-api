host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
  description: A production-ready Go REST API with RBAC, JWT authentication, and permission
    management
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Go API Base
  version: "1.0"
paths:
  /api/v1/admin/media:
    get:
      consumes:
      - application/json
      description: List all media files with filtering. Admin access only.
      parameters:
      - description: Filter by model type
        in: query
        name: model_type
        type: string
      - description: Filter by model ID
        in: query
        name: model_id
        type: string
      - description: Include soft-deleted media
        in: query
        name: include_deleted
        type: boolean
      - default: 20
        description: Limit (max 100)
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/handler.AdminMediaListResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Envelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Envelope'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: List all media (admin)
      tags:
      - media
      - admin
  /api/v1/admin/media/cleanup:
    post:
      consumes:
      - application/json
      description: Trigger cleanup of orphaned media files. Admin access only.
      parameters:
      - default: 24
        description: Hours since orphaned
        in: query
        name: cutoff_hours
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/handler.CleanupResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Envelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Envelope'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Cleanup orphaned media (admin)
      tags:
      - media
      - admin
  /api/v1/admin/media/stats:
    get:
      consumes:
      - application/json
      description: Get storage statistics for all media files. Admin access only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/handler.MediaStatsResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Envelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Envelope'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: Get media statistics (admin)
      tags:
      - media
      - admin
  /api/v1/api-keys:
    get:
      consumes:
      - application/json
      description: List all API keys for the authenticated user with pagination
      parameters:
      - description: 'Number of results (default: 20, max: 100)'
        in: query
        name: limit
        type: integer
      - description: 'Pagination offset (default: 0)'
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/handler.ListAPIKeysResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Envelope'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.Envelope'
      security:
      - BearerAuth: []
      summary: List API keys
      tags:
      - api-keys
    post:
      consumes:
      - application/json
      description: Create a new API key with specified scopes for the authenticated
        user
      parameters:
      - description: API key details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.CreateAPIKeyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/handler.CreateAPIKeyResponse'
              type: object
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/response.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Envelope'
        "403":
          description: Permission denied
          schema:
            $ref: '#/definitions/response.Envelope'
        "409":
          description: API key name already exists
          schema:
            $ref: '#/definitions/response.Envelope'
