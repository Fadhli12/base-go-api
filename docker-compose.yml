version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: go-api-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: go_api_base
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - go-api-network

  redis:
    image: redis:7-alpine
    container_name: go-api-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - go-api-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-api-server
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/go_api_base?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-production-min-32-chars
      LOG_LEVEL: info
      GIN_MODE: release
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - go-api-network

volumes:
  postgres_data:

networks:
  go-api-network:
    driver: bridge